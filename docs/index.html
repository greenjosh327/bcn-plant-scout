<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BCN Plant Scout</title>
    <meta
      name="description"
      content="BCN Plant Scout privacy policy and app information."
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7ee;
        --card: #ffffff;
        --ink: #17391f;
        --muted: #53654c;
        --line: #d9e2cf;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
        line-height: 1.6;
      }

      main {
        margin: 0 auto;
        max-width: 820px;
        padding: 48px 20px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 32px;
      }

      h1 {
        font-size: clamp(2rem, 5vw, 3.2rem);
        line-height: 1.1;
        margin: 0 0 16px;
      }

      p {
        color: var(--muted);
        font-size: 1.1rem;
      }

      a {
        color: var(--ink);
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>BCN Plant Scout</h1>
        <p>
          Local-first plant scouting for Base Camp North: photos, GPS field
          records, return notes, exports, and Supabase sync.
        </p>
        <p>
          <a href="./privacy-policy/">Read the Privacy Policy</a>
        </p>
        <p>
          <a href="./delete-account/">Request Account Deletion</a>
        </p>
      </section>
    </main>
  </body>
</html>
